version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/mamori
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

dockers:
  - image_templates:
      - "ghcr.io/phyberapex/mamori:{{ .Tag }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    goos: linux
    goarch: amd64

  - image_templates:
      - "ghcr.io/phyberapex/mamori:{{ .Tag }}-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64/v8"
    goos: linux
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/phyberapex/mamori:{{ .Tag }}"
    image_templates:
      - "ghcr.io/phyberapex/mamori:{{ .Tag }}-amd64"
      - "ghcr.io/phyberapex/mamori:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/phyberapex/mamori:latest"
    image_templates:
      - "ghcr.io/phyberapex/mamori:{{ .Tag }}-amd64"
      - "ghcr.io/phyberapex/mamori:{{ .Tag }}-arm64"

brews:
  - repository:
      owner: PhyberApex
      name: homebrew-tap
      token: "{{ .Env.GH_PAT }}"
    homepage: "https://github.com/PhyberApex/mamori"
    description: "Concurrent HTTP security header scanner"
    license: "MIT"
    install: |
      bin.install "mamori"

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
